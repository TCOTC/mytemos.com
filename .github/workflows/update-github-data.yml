name: Update GitHub contributions

on:
  schedule:
    # 每天 UTC 00:00（北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch GitHub contribution data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: TCOTC
        run: node scripts/fetch-github.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet src/data/github-contributions.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/github-contributions.json
          git commit -m "$(cat <<'EOF'
chore: update GitHub contribution data

EOF
)"
          git push
